<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Diario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #e8e8e8;
    --muted: #666;
    --input-bg: #111;
    --section-colors: #e8ff47, #ff6b35, #4ef0c4, #b88cf8, #ff8fab, #60d0ff, #ffd166, #a8dadc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .date-display {
    font-size: 0.8rem;
    color: var(--muted);
  }
  #date-picker {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
  }
  #date-picker:focus { outline: 1px solid var(--accent); }

  /* Main layout */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* Section */
  .section {
    margin-bottom: 2.5rem;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-tag {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    background: var(--accent);
    color: #000;
  }
  .section-name {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  /* Table */
  .product-table {
    width: 100%;
    border-collapse: collapse;
  }
  .product-table thead th {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.4rem 0.75rem;
    text-align: left;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .product-table thead th:first-child { width: 40%; border-radius: 4px 0 0 0; }
  .product-table thead th:last-child { border-radius: 0 4px 0 0; }
  .product-table thead th.num { text-align: right; }

  .product-table tbody tr {
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.1s;
  }
  .product-table tbody tr:hover { background: #161616; }

  .product-table td {
    padding: 0.35rem 0.75rem;
    font-size: 0.82rem;
  }
  .product-table td.name-cell {
    color: #ccc;
  }
  .product-table td.total-cell {
    font-weight: 500;
    text-align: right;
    color: var(--accent);
    font-size: 0.85rem;
    min-width: 70px;
  }
  .product-table td.total-cell.zero { color: var(--muted); }

  /* Inputs */
  .num-input {
    width: 80px;
    background: var(--input-bg);
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 0.3rem 0.5rem;
    text-align: right;
    transition: border-color 0.15s;
    display: block;
    margin-left: auto;
  }
  .num-input:focus {
    outline: none;
    border-color: var(--accent);
    background: #1a1a1a;
  }
  .num-input:not([value=""]):not([value="0"]) {
    color: #fff;
  }

  /* Observations */
  /* Footer actions */
  .actions-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .summary-pill {
    font-size: 0.75rem;
    color: var(--muted);
  }
  .summary-pill span { color: var(--accent); font-weight: 500; }
  .btn-group { display: flex; gap: 0.75rem; }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    padding: 0.6rem 1.2rem;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  .btn-export {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  .btn-save {
    background: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .btn-save:hover { background: #d4eb00; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    right: 2rem;
    background: #1e1e1e;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.78rem;
    padding: 0.6rem 1.2rem;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  #toast.show { opacity: 1; }

  /* Section color accent bars */
  .section:nth-child(1) .section-tag { background: #e8ff47; }
  .section:nth-child(2) .section-tag { background: #ff6b35; color: #fff; }
  .section:nth-child(3) .section-tag { background: #4ef0c4; }
  .section:nth-child(4) .section-tag { background: #b88cf8; }
  .section:nth-child(5) .section-tag { background: #ff8fab; }
  .section:nth-child(6) .section-tag { background: #60d0ff; }
  .section:nth-child(7) .section-tag { background: #ffd166; }
  .section:nth-child(8) .section-tag { background: #a8dadc; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>◆ STOCK DIARIO</h1>
  <div class="header-meta">
    <input type="date" id="date-picker" />
    <span class="date-display" id="live-clock"></span>
  </div>
</header>

<main id="form-root"></main>

<div class="actions-bar">
  <div class="summary-pill">Productos con stock: <span id="filled-count">0</span> / <span id="total-count">0</span></div>
  <div class="btn-group">
    <button class="btn-clear" onclick="clearAll()">Limpiar todo</button>
    <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
    <button class="btn-save" onclick="saveData()">Guardar ✓</button>
  </div>
</div>

<div id="toast"></div>

<script>
const PRODUCTS = [
  // Panadería / General
  { cat: 'Panadería', items: [
    'Muzza KG','Chipas caliente kg','Medialunas','Masa XG','Masa chica',
    'Pizzeta rect','Tequeños','Ciabata'
  ]},
  // Empanadas clásicas
  { cat: 'Empanadas Clásicas', items: [
    'EMP. CARNE','EMP. CARNE PICANTE','EMP. CEBOLLA Y QUESO','EMP. HUMITA',
    'EMP. JAM Y QUE','EMP. POLLO','EMP. VERDURA'
  ]},
  // Empanadas especiales
  { cat: 'Empanadas Especiales', items: [
    'EMP VEGGIE INTEGRAL','EMP. BONDIOLA BBQ','EMP. CC.','EMP. CHEESE BURGER',
    'EMP. MEDITERRANEA','EMP. ROQUEFORT JAMON'
  ]},
  // Postres / Congelados / S/TACC
  { cat: 'Postres / Congelados / S·TACC', items: [
    'COOKI CREAM','DULCE DE LECHE','FRUTILLA AL AGUA',
    'Muzzarella (cong.)','Jamon (cong.)','Fugazzeta (cong.)',
    'Pizzeta (S/TACC)','Emp ca x 3 (S/TACC)','Canastilla JQ (S/TACC)'
  ]},
  // Aguas
  { cat: 'Aguas', items: [
    'Aqu 500 pera','Aqu 500 pomelo','Aqu 500 manzana','Aqu 500 UVA',
    'Aqu 500 Ananá y gengibre','Benedictino 500','Benedictino 500 C/G',
    'Benedictino 1,5','Aqu 237 pomelo','Aqua 237 UVA','Aqu 237 pera',
    'Smart 590','Smart 590 C/G','aquarius manzana 1,5','Beneditino 2.25','Smart 900'
  ]},
  // Gaseosas
  { cat: 'Gaseosas', items: [
    'Coca cola 500 ml','Coca light 500 ml','Coca zero 500 ml',
    'Coca lata 354 ml','Coca Zero lata 354 ml','Sprite lata 354 ml','Sprite Zero lata 354 ml',
    'Sprite 500 ml','Sprite Zero 500 ml','Fanta 500 ml',
    'Coca cola 237 ml','Coca cola zero 237 ml','Sprite 237 ml','Sprite Zero 237 ml',
    'Fanta 237 ml','Pomelo 237',
    'Sprite 1.75 L','Sprite Zero 1.75 L','Coca cola 1.75 L','Coca light 1.75 L',
    'Coca zero 1.75 L','Fanta 1.75 L'
  ]},
  // Cervezas
  { cat: 'Cervezas', items: [
    'Brahma','Quilmes','Patagonia','Andes Rubia','Andes Roja',
    'Andes Negra','Andes IPA','Stella','Corona'
  ]},
];

const state = {};  // { productName: { freezer: '', heladera: '' } }

// Init state
PRODUCTS.forEach(sec => sec.items.forEach(name => {
  state[name] = { freezer: '', heladera: '' };
}));

// Set today's date
const dp = document.getElementById('date-picker');
const today = new Date();
dp.value = today.toISOString().split('T')[0];

// Live clock
function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent = now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 10000);

// Render
function render() {
  const root = document.getElementById('form-root');
  root.innerHTML = '';
  let totalProducts = 0;

  PRODUCTS.forEach((sec, si) => {
    totalProducts += sec.items.length;
    const div = document.createElement('div');
    div.className = 'section';

    div.innerHTML = `
      <div class="section-header">
        <span class="section-tag">${String(si+1).padStart(2,'0')}</span>
        <span class="section-name">${sec.cat}</span>
      </div>
      <table class="product-table">
        <thead>
          <tr>
            <th>Producto</th>
            <th class="num">Fzr./dep</th>
            <th class="num">Heladera</th>
            <th class="num">Total</th>
          </tr>
        </thead>
        <tbody>
          ${sec.items.map(name => renderRow(name)).join('')}
        </tbody>
      </table>
    `;
    root.appendChild(div);
  });

  document.getElementById('total-count').textContent = totalProducts;
  updateSummary();
  attachListeners();
}

function renderRow(name) {
  const s = state[name];
  const fzr = s.freezer === '' ? '' : Number(s.freezer);
  const hel = s.heladera === '' ? '' : Number(s.heladera);
  const total = (fzr === '' && hel === '') ? 0 : ((fzr||0) + (hel||0));
  const hasTotal = fzr !== '' || hel !== '';
  const totalClass = hasTotal ? (total === 0 ? 'total-cell zero' : 'total-cell') : 'total-cell zero';
  const totalDisplay = hasTotal ? total : '—';
  const id = CSS.escape(name);

  return `<tr>
    <td class="name-cell">${name}</td>
    <td><input type="number" class="num-input" data-name="${name}" data-field="freezer" value="${s.freezer}" min="0" placeholder="—" /></td>
    <td><input type="number" class="num-input" data-name="${name}" data-field="heladera" value="${s.heladera}" min="0" placeholder="—" /></td>
    <td class="${totalClass}">${totalDisplay}</td>
  </tr>`;
}

function attachListeners() {
  document.querySelectorAll('[data-name]').forEach(el => {
    el.addEventListener('input', function() {
      const name = this.dataset.name;
      const field = this.dataset.field;
      state[name][field] = this.value;
      updateRow(this.closest('tr'), name);
      updateSummary();
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const all = Array.from(document.querySelectorAll('.num-input'));
        const idx = all.indexOf(this);
        if (idx < all.length - 1) all[idx+1].focus();
      }
    });
  });
}

function updateRow(tr, name) {
  const s = state[name];
  const fzr = s.freezer === '' ? '' : Number(s.freezer);
  const hel = s.heladera === '' ? '' : Number(s.heladera);
  const hasTotal = fzr !== '' || hel !== '';
  const total = (fzr||0) + (hel||0);
  const td = tr.querySelector('.total-cell, .zero');
  if (td) {
    td.className = hasTotal ? (total === 0 ? 'total-cell zero' : 'total-cell') : 'total-cell zero';
    td.textContent = hasTotal ? total : '—';
  }
}

function updateSummary() {
  let filled = 0;
  let total = 0;
  PRODUCTS.forEach(sec => sec.items.forEach(name => {
    total++;
    const s = state[name];
    if (s.freezer !== '' || s.heladera !== '') filled++;
  }));
  document.getElementById('filled-count').textContent = filled;
  document.getElementById('total-count').textContent = total;
}

function clearAll() {
  if (!confirm('¿Limpiar todos los valores ingresados?')) return;
  PRODUCTS.forEach(sec => sec.items.forEach(name => {
    state[name] = { freezer: '', heladera: '' };
  }));
  render();
  toast('Formulario limpiado');
}

function saveData() {
  const date = dp.value;
  const rows = [];
  PRODUCTS.forEach(sec => {
    sec.items.forEach(name => {
      const s = state[name];
      if (s.freezer !== '' || s.heladera !== '') {
        rows.push({ date, categoria: sec.cat, producto: name, ...s });
      }
    });
  });
  // Save to localStorage
  const key = `stock_${date}`;
  localStorage.setItem(key, JSON.stringify({ date, rows, saved_at: new Date().toISOString() }));
  toast(`✓ Guardado: ${date} (${rows.length} productos)`);
}

function exportCSV() {
  const date = dp.value;
  const lines = ['Fecha,Categoría,Producto,Fzr/Dep,Heladera,Total'];
  PRODUCTS.forEach(sec => {
    sec.items.forEach(name => {
      const s = state[name];
      const fzr = s.freezer === '' ? '' : Number(s.freezer);
      const hel = s.heladera === '' ? '' : Number(s.heladera);
      const total = (fzr||0) + (hel||0);
      lines.push(`${date},"${sec.cat}","${name}",${s.freezer},${s.heladera},${total}`);
    });
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `stock_${date}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('CSV exportado');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Load saved data if exists
function tryLoadSaved() {
  const date = dp.value;
  const saved = localStorage.getItem(`stock_${date}`);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      data.rows.forEach(row => {
        if (state[row.producto]) {
          state[row.producto] = { freezer: row.freezer, heladera: row.heladera };
        }
      });
      toast(`Datos del ${date} restaurados`);
    } catch(e) {}
  }
}

dp.addEventListener('change', () => {
  // Reset state
  PRODUCTS.forEach(sec => sec.items.forEach(name => {
    state[name] = { freezer: '', heladera: '' };
  }));
  tryLoadSaved();
  render();
});

tryLoadSaved();
render();
</script>
</body>
</html>
