<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Diario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #e8e8e8;
    --muted: #666;
    --input-bg: #111;
    --section-colors: #e8ff47, #ff6b35, #4ef0c4, #b88cf8, #ff8fab, #60d0ff, #ffd166, #a8dadc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .date-display { font-size: 0.8rem; color: var(--muted); }
  #date-picker {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.4rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
  }
  #date-picker:focus { outline: 1px solid var(--accent); }

  /* Usuario badge */
  .user-badge {
    font-size: 0.72rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .user-badge:hover { border-color: var(--accent); color: var(--accent); }
  .user-badge span { color: var(--accent); }

  main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  .section { margin-bottom: 2.5rem; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-tag {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    background: var(--accent);
    color: #000;
  }
  .section-name {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .product-table { width: 100%; border-collapse: collapse; }
  .product-table thead th {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.4rem 0.75rem;
    text-align: left;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .product-table thead th:first-child { width: 40%; border-radius: 4px 0 0 0; }
  .product-table thead th:last-child { border-radius: 0 4px 0 0; }
  .product-table thead th.num { text-align: right; }
  .product-table tbody tr { border-bottom: 1px solid #1a1a1a; transition: background 0.1s; }
  .product-table tbody tr:hover { background: #161616; }
  .product-table td { padding: 0.35rem 0.75rem; font-size: 0.82rem; }
  .product-table td.name-cell { color: #ccc; }
  .product-table td.total-cell {
    font-weight: 500;
    text-align: right;
    color: var(--accent);
    font-size: 0.85rem;
    min-width: 70px;
  }
  .product-table td.total-cell.zero { color: var(--muted); }

  .num-input {
    width: 80px;
    background: var(--input-bg);
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 0.3rem 0.5rem;
    text-align: right;
    transition: border-color 0.15s;
    display: block;
    margin-left: auto;
  }
  .num-input:focus { outline: none; border-color: var(--accent); background: #1a1a1a; }

  .actions-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .summary-pill { font-size: 0.75rem; color: var(--muted); }
  .summary-pill span { color: var(--accent); font-weight: 500; }
  .btn-group { display: flex; gap: 0.75rem; }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    padding: 0.6rem 1.2rem;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-export { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save { background: var(--accent); color: #000; font-weight: 500; }
  .btn-save:hover { background: #d4eb00; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }
  .btn-save:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }

  /* Status indicator */
  .sync-status {
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .sync-dot.syncing { background: #ffd166; animation: pulse 1s infinite; }
  .sync-dot.ok      { background: #4ef0c4; }
  .sync-dot.error   { background: var(--accent2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #toast {
    position: fixed;
    bottom: 80px;
    right: 2rem;
    background: #1e1e1e;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.78rem;
    padding: 0.6rem 1.2rem;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
    max-width: 300px;
  }
  #toast.show { opacity: 1; }
  #toast.error { border-color: var(--accent2); color: var(--accent2); }

  .section:nth-child(1) .section-tag { background: #e8ff47; }
  .section:nth-child(2) .section-tag { background: #ff6b35; color: #fff; }
  .section:nth-child(3) .section-tag { background: #4ef0c4; }
  .section:nth-child(4) .section-tag { background: #b88cf8; }
  .section:nth-child(5) .section-tag { background: #ff8fab; }
  .section:nth-child(6) .section-tag { background: #60d0ff; }
  .section:nth-child(7) .section-tag { background: #ffd166; }
  .section:nth-child(8) .section-tag { background: #a8dadc; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>◆ STOCK DIARIO</h1>
  <div class="header-meta">
    <input type="date" id="date-picker" />
    <div class="user-badge" onclick="cambiarUsuario()" title="Clic para cerrar sesión">
      👤 <span id="usuario-display">—</span>
      <span id="usuario-email" style="color:var(--muted);font-size:0.65rem;margin-left:0.4rem;"></span>
    </div>
    <span class="date-display" id="live-clock"></span>
  </div>
</header>

<main id="form-root"></main>

<div class="actions-bar">
  <div style="display:flex;align-items:center;gap:1.2rem;">
    <div class="summary-pill">Productos con stock: <span id="filled-count">0</span> / <span id="total-count">0</span></div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label" style="color:var(--muted);font-size:0.7rem;">—</span>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn-clear" onclick="clearAll()">Limpiar todo</button>
    <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
    <button class="btn-save" id="btn-save" onclick="saveData()">Guardar ✓</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// ★ ÚNICA LÍNEA QUE DEBÉS CAMBIAR:
//   Reemplazá la URL de abajo por la URL que te dio Apps Script
//   al hacer "Implementar → Nueva implementación"
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/REEMPLAZAR_CON_TU_URL/exec';

// ============================================================
const PRODUCTS = [
  { cat: 'Panadería', items: [
    'Muzza KG','Chipas caliente kg','Medialunas','Masa XG','Masa chica',
    'Pizzeta rect','Tequeños','Ciabata'
  ]},
  { cat: 'Empanadas Clásicas', items: [
    'EMP. CARNE','EMP. CARNE PICANTE','EMP. CEBOLLA Y QUESO','EMP. HUMITA',
    'EMP. JAM Y QUE','EMP. POLLO','EMP. VERDURA'
  ]},
  { cat: 'Empanadas Especiales', items: [
    'EMP VEGGIE INTEGRAL','EMP. BONDIOLA BBQ','EMP. CC.','EMP. CHEESE BURGER',
    'EMP. MEDITERRANEA','EMP. ROQUEFORT JAMON'
  ]},
  { cat: 'Postres / Congelados / S·TACC', items: [
    'COOKI CREAM','DULCE DE LECHE','FRUTILLA AL AGUA',
    'Muzzarella (cong.)','Jamon (cong.)','Fugazzeta (cong.)',
    'Pizzeta (S/TACC)','Emp ca x 3 (S/TACC)','Canastilla JQ (S/TACC)'
  ]},
  { cat: 'Aguas', items: [
    'Aqu 500 pera','Aqu 500 pomelo','Aqu 500 manzana','Aqu 500 UVA',
    'Aqu 500 Ananá y gengibre','Benedictino 500','Benedictino 500 C/G',
    'Benedictino 1,5','Aqu 237 pomelo','Aqua 237 UVA','Aqu 237 pera',
    'Smart 590','Smart 590 C/G','aquarius manzana 1,5','Beneditino 2.25','Smart 900'
  ]},
  { cat: 'Gaseosas', items: [
    'Coca cola 500 ml','Coca light 500 ml','Coca zero 500 ml',
    'Coca lata 354 ml','Coca Zero lata 354 ml','Sprite lata 354 ml','Sprite Zero lata 354 ml',
    'Sprite 500 ml','Sprite Zero 500 ml','Fanta 500 ml',
    'Coca cola 237 ml','Coca cola zero 237 ml','Sprite 237 ml','Sprite Zero 237 ml',
    'Fanta 237 ml','Pomelo 237',
    'Sprite 1.75 L','Sprite Zero 1.75 L','Coca cola 1.75 L','Coca light 1.75 L',
    'Coca zero 1.75 L','Fanta 1.75 L'
  ]},
  { cat: 'Cervezas', items: [
    'Brahma','Quilmes','Patagonia','Andes Rubia','Andes Roja',
    'Andes Negra','Andes IPA','Stella','Corona'
  ]},
];

const state = {};
PRODUCTS.forEach(sec => sec.items.forEach(name => {
  state[name] = { freezer: '', heladera: '' };
}));

// ============================================================
// ★ EMAILS AUTORIZADOS — lista de control en el cliente
// Esto NO reemplaza la validación del servidor (Apps Script),
// es una primera capa que evita que usuarios no autorizados
// siquiera lleguen a intentar guardar.
// ============================================================
const EMAILS_AUTORIZADOS = [
  'pablo@tomassoglobal.com',
  'caba.corrientes427@tomassoglobal.com',
  'ctherubicon@outlook.com',
  // agregá más emails acá si necesitás
];
// ============================================================

// ── Sesión de usuario ─────────────────────────────────────────
function getSession() {
  try {
    const s = localStorage.getItem('stock_session');
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}
function setSession(email, nombre) {
  localStorage.setItem('stock_session', JSON.stringify({ email, nombre, ts: Date.now() }));
}
function clearSession() {
  localStorage.removeItem('stock_session');
}
function getUsuario() {
  const s = getSession();
  return s ? s.nombre : '';
}
function getEmail() {
  const s = getSession();
  return s ? s.email : '';
}

// ── Login overlay ─────────────────────────────────────────────
function mostrarLogin(mensaje) {
  // Bloquear el formulario
  document.getElementById('form-root').style.display = 'none';
  document.querySelector('.actions-bar').style.display = 'none';

  const overlay = document.createElement('div');
  overlay.id = 'login-overlay';
  overlay.style.cssText = `
    position:fixed; inset:0; background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    z-index:999; flex-direction:column; gap:1.5rem;
    font-family:'DM Mono',monospace;
  `;
  overlay.innerHTML = `
    <div style="text-align:center;">
      <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
                  color:var(--accent);letter-spacing:-0.02em;">◆ STOCK DIARIO</div>
      <div style="color:var(--muted);font-size:0.75rem;margin-top:0.4rem;">Tomasso — Acceso restringido</div>
    </div>
    ${mensaje ? `<div style="color:var(--accent2);font-size:0.78rem;border:1px solid var(--accent2);
                  padding:0.5rem 1rem;border-radius:4px;">${mensaje}</div>` : ''}
    <div style="display:flex;flex-direction:column;gap:0.8rem;width:320px;">
      <div style="font-size:0.72rem;color:var(--muted);">Tu email de Google</div>
      <input id="login-email" type="email" placeholder="nombre@ejemplo.com"
        style="background:var(--input-bg);border:1px solid var(--border);color:var(--text);
               font-family:'DM Mono',monospace;font-size:0.85rem;padding:0.6rem 0.9rem;
               border-radius:4px;width:100%;outline:none;"
        autocomplete="email" />
      <div style="font-size:0.72rem;color:var(--muted);">Tu nombre (para identificar envíos)</div>
      <input id="login-nombre" type="text" placeholder="Pablo"
        style="background:var(--input-bg);border:1px solid var(--border);color:var(--text);
               font-family:'DM Mono',monospace;font-size:0.85rem;padding:0.6rem 0.9rem;
               border-radius:4px;width:100%;outline:none;" />
      <button onclick="intentarLogin()"
        style="background:var(--accent);color:#000;font-family:'DM Mono',monospace;
               font-size:0.85rem;font-weight:500;border:none;border-radius:4px;
               padding:0.7rem;cursor:pointer;margin-top:0.3rem;">
        Ingresar →
      </button>
    </div>
    <div style="font-size:0.65rem;color:var(--muted);text-align:center;max-width:300px;">
      Solo cuentas autorizadas pueden acceder.<br>
      Si no tenés acceso, contactá al administrador.
    </div>
  `;
  document.body.appendChild(overlay);

  // Enter en los inputs dispara login
  ['login-email','login-nombre'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') intentarLogin();
    });
  });

  // Foco automático
  setTimeout(() => document.getElementById('login-email').focus(), 100);
}

function intentarLogin() {
  const email  = (document.getElementById('login-email').value  || '').trim().toLowerCase();
  const nombre = (document.getElementById('login-nombre').value || '').trim();

  if (!email) {
    document.getElementById('login-email').style.borderColor = 'var(--accent2)';
    return;
  }
  if (!nombre) {
    document.getElementById('login-nombre').style.borderColor = 'var(--accent2)';
    return;
  }

  // Validar contra lista autorizada
  if (!EMAILS_AUTORIZADOS.includes(email)) {
    document.getElementById('login-overlay').remove();
    mostrarLogin('❌ Email no autorizado: ' + email);
    return;
  }

  // Login exitoso
  setSession(email, nombre);
  document.getElementById('login-overlay').remove();
  activarFormulario(nombre, email);
}

function activarFormulario(nombre, email) {
  document.getElementById('form-root').style.display = '';
  document.querySelector('.actions-bar').style.display = '';
  document.getElementById('usuario-display').textContent = nombre;
  document.getElementById('usuario-email').textContent   = email;
}

function cambiarUsuario() {
  if (!confirm('¿Cerrar sesión de ' + getEmail() + '?')) return;
  clearSession();
  location.reload();
}

// ── Inicializar sesión al cargar ──────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const session = getSession();
  if (!session || !session.email) {
    mostrarLogin(null);
  } else if (!EMAILS_AUTORIZADOS.includes(session.email.toLowerCase())) {
    clearSession();
    mostrarLogin('⚠️ Tu sesión anterior no es válida.');
  } else {
    activarFormulario(session.nombre, session.email);
  }
});

// ── Fecha y reloj ─────────────────────────────────────────────
const dp = document.getElementById('date-picker');
const today = new Date();
dp.value = today.toISOString().split('T')[0];

function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent =
    now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 10000);

// ── Sync status ───────────────────────────────────────────────
function setSyncStatus(estado) {
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (estado === 'syncing') {
    dot.classList.add('syncing');
    label.textContent = 'enviando...';
  } else if (estado === 'ok') {
    dot.classList.add('ok');
    label.textContent = 'guardado en Sheets ✓';
  } else if (estado === 'error') {
    dot.classList.add('error');
    label.textContent = 'error al guardar';
  } else {
    label.textContent = '—';
  }
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('form-root');
  root.innerHTML = '';
  let totalProducts = 0;

  PRODUCTS.forEach((sec, si) => {
    totalProducts += sec.items.length;
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="section-header">
        <span class="section-tag">${String(si+1).padStart(2,'0')}</span>
        <span class="section-name">${sec.cat}</span>
      </div>
      <table class="product-table">
        <thead>
          <tr>
            <th>Producto</th>
            <th class="num">Fzr./dep</th>
            <th class="num">Heladera</th>
            <th class="num">Total</th>
          </tr>
        </thead>
        <tbody>
          ${sec.items.map(name => renderRow(name)).join('')}
        </tbody>
      </table>`;
    root.appendChild(div);
  });

  document.getElementById('total-count').textContent = totalProducts;
  updateSummary();
  attachListeners();
}

function renderRow(name) {
  const s = state[name];
  const fzr = s.freezer === '' ? '' : Number(s.freezer);
  const hel = s.heladera === '' ? '' : Number(s.heladera);
  const total = (fzr === '' && hel === '') ? 0 : ((fzr||0) + (hel||0));
  const hasTotal = fzr !== '' || hel !== '';
  const totalClass = hasTotal ? (total === 0 ? 'total-cell zero' : 'total-cell') : 'total-cell zero';
  const totalDisplay = hasTotal ? total : '—';

  return `<tr>
    <td class="name-cell">${name}</td>
    <td><input type="number" class="num-input" data-name="${name}" data-field="freezer"  value="${s.freezer}"  min="0" placeholder="—" /></td>
    <td><input type="number" class="num-input" data-name="${name}" data-field="heladera" value="${s.heladera}" min="0" placeholder="—" /></td>
    <td class="${totalClass}">${totalDisplay}</td>
  </tr>`;
}

function attachListeners() {
  document.querySelectorAll('[data-name]').forEach(el => {
    el.addEventListener('input', function() {
      state[this.dataset.name][this.dataset.field] = this.value;
      updateRow(this.closest('tr'), this.dataset.name);
      updateSummary();
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const all = Array.from(document.querySelectorAll('.num-input'));
        const idx = all.indexOf(this);
        if (idx < all.length - 1) all[idx+1].focus();
      }
    });
  });
}

function updateRow(tr, name) {
  const s = state[name];
  const fzr = s.freezer === '' ? '' : Number(s.freezer);
  const hel = s.heladera === '' ? '' : Number(s.heladera);
  const hasTotal = fzr !== '' || hel !== '';
  const total = (fzr||0) + (hel||0);
  const td = tr.querySelector('.total-cell, .zero');
  if (td) {
    td.className = hasTotal ? (total === 0 ? 'total-cell zero' : 'total-cell') : 'total-cell zero';
    td.textContent = hasTotal ? total : '—';
  }
}

function updateSummary() {
  let filled = 0, total = 0;
  PRODUCTS.forEach(sec => sec.items.forEach(name => {
    total++;
    const s = state[name];
    if (s.freezer !== '' || s.heladera !== '') filled++;
  }));
  document.getElementById('filled-count').textContent = filled;
  document.getElementById('total-count').textContent = total;
}

// ── GUARDAR → Google Sheets ───────────────────────────────────
async function saveData() {
  const date    = dp.value;
  const usuario = getUsuario();
  const rows    = [];

  PRODUCTS.forEach(sec => {
    sec.items.forEach(name => {
      const s = state[name];
      // Incluir TODOS los productos (con o sin stock) para tener registro completo
      rows.push({
        categoria: sec.cat,
        producto:  name,
        freezer:   s.freezer  === '' ? 0 : Number(s.freezer),
        heladera:  s.heladera === '' ? 0 : Number(s.heladera)
      });
    });
  });

  const payload = { date, usuario, email: getEmail(), rows };

  // UI feedback
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  setSyncStatus('syncing');

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      // Apps Script requiere text/plain para evitar preflight CORS
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.status === 'ok') {
      // También guardar en localStorage como respaldo local
      localStorage.setItem(`stock_${date}`, JSON.stringify({ date, rows, saved_at: new Date().toISOString() }));
      setSyncStatus('ok');
      toast(`✓ ${data.rows} productos enviados a Google Sheets`);
    } else {
      throw new Error(data.message || 'Respuesta inesperada');
    }

  } catch (err) {
    setSyncStatus('error');
    // Fallback: guardar en localStorage igual
    localStorage.setItem(`stock_${date}`, JSON.stringify({ date, rows, saved_at: new Date().toISOString() }));
    toast(`⚠ Sin conexión — datos guardados localmente.\nReintentá cuando vuelva internet.`, true);
    console.error('Error al enviar a Sheets:', err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar ✓';
  }
}

// ── Exportar CSV (sin cambios) ────────────────────────────────
function exportCSV() {
  const date = dp.value;
  const lines = ['Fecha,Categoría,Producto,Fzr/Dep,Heladera,Total'];
  PRODUCTS.forEach(sec => {
    sec.items.forEach(name => {
      const s = state[name];
      const fzr = s.freezer === '' ? '' : Number(s.freezer);
      const hel = s.heladera === '' ? '' : Number(s.heladera);
      const total = (fzr||0) + (hel||0);
      lines.push(`${date},"${sec.cat}","${name}",${s.freezer},${s.heladera},${total}`);
    });
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `stock_${date}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('CSV exportado');
}

function clearAll() {
  if (!confirm('¿Limpiar todos los valores ingresados?')) return;
  PRODUCTS.forEach(sec => sec.items.forEach(name => {
    state[name] = { freezer: '', heladera: '' };
  }));
  render();
  toast('Formulario limpiado');
}

function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error show' : 'show';
  setTimeout(() => t.className = '', 3200);
}

// ── Restaurar datos guardados ─────────────────────────────────
function tryLoadSaved() {
  const date  = dp.value;
  const saved = localStorage.getItem(`stock_${date}`);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      data.rows.forEach(row => {
        const key = row.producto || row.product;
        if (key && state[key]) {
          state[key] = {
            freezer:  String(row.freezer  ?? row.Fzr_Dep ?? ''),
            heladera: String(row.heladera ?? row.Heladera ?? '')
          };
        }
      });
      toast(`Datos del ${date} restaurados desde caché local`);
    } catch(e) {}
  }
}

dp.addEventListener('change', () => {
  PRODUCTS.forEach(sec => sec.items.forEach(name => {
    state[name] = { freezer: '', heladera: '' };
  }));
  tryLoadSaved();
  render();
});

tryLoadSaved();
render();
</script>
